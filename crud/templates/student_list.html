<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            padding: 30px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #eee;
        }
        a.button {
            padding: 5px 10px;
            text-decoration: none;
            color: white;
            border-radius: 4px;
        }
        a.edit { background-color: #2c7be5; }
        a.delete { background-color: #e52c2c; }
        a.add { background-color: #28a745; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<h2>All Students</h2>



<a href="{% url 'student_create' %}" class="button add">+ Add New Student</a>
<a href="{% url 'teachers_list' %}" class="button add">👉Our Teachers </a>

<table>
    <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Email</th>
        <th>Class</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.roll_number }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.get_student_class_display }}</td>
        <td>
            <a href="{% url 'student_edit' student.id %}" class="button edit">Edit</a>
            <a href="{% url 'student_delete' student.id %}" class="button delete">Delete</a>
        </td>
    </tr>


    {% empty %}
    <tr>
        <td colspan="5">No students available</td>
    </tr>
    {% endfor %}

</table>

<div>
   

</div>

</body>
</html>
